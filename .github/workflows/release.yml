name: Release

# Builds a signed release APK. Trigger it manually from the Actions tab
# (Run workflow), or by pushing a version tag, e.g. `git tag v1.01 && git push --tags`.
on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    name: Signed release build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release on tag pushes
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" \
                     "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ORACLE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ORACLE_KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Write google-services.json (optional)
        env:
          GS_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GS_JSON_BASE64" ]; then
            echo "$GS_JSON_BASE64" | base64 -d > app/google-services.json
            echo "Firebase config written; Crashlytics enabled for this build."
          else
            echo "No Firebase config provided; building without Crashlytics."
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up GPU build dependencies (Vulkan + OpenCL)
        uses: ./.github/actions/gpu-deps

      - name: Assemble signed release
        env:
          ORACLE_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ORACLE_KEYSTORE_PASSWORD: ${{ secrets.ORACLE_KEYSTORE_PASSWORD }}
          ORACLE_KEY_ALIAS: ${{ secrets.ORACLE_KEY_ALIAS }}
          ORACLE_KEY_PASSWORD: ${{ secrets.ORACLE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Print signing SHA fingerprints
        env:
          ORACLE_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ORACLE_KEYSTORE_PASSWORD: ${{ secrets.ORACLE_KEYSTORE_PASSWORD }}
          ORACLE_KEY_ALIAS: ${{ secrets.ORACLE_KEY_ALIAS }}
          ORACLE_KEY_PASSWORD: ${{ secrets.ORACLE_KEY_PASSWORD }}
        run: ./gradlew :app:printSigningSha -q

      - name: Upload native crash symbols
        env:
          GS_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          ORACLE_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ORACLE_KEYSTORE_PASSWORD: ${{ secrets.ORACLE_KEYSTORE_PASSWORD }}
          ORACLE_KEY_ALIAS: ${{ secrets.ORACLE_KEY_ALIAS }}
          ORACLE_KEY_PASSWORD: ${{ secrets.ORACLE_KEY_PASSWORD }}
        run: |
          # The upload task only exists when Firebase is configured (google-services.json
          # present), so skip it otherwise rather than failing on a missing task.
          if [ -n "$GS_JSON_BASE64" ]; then
            ./gradlew :app:uploadCrashlyticsSymbolFileRelease --stacktrace
          else
            echo "No Firebase config; skipping native symbol upload."
          fi

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true   # nothing is public until you review and click Publish
          generate_release_notes: false
          body_path: docs/release-notes/v1.01.md
          files: app/build/outputs/apk/release/*.apk
