name: Release

# Builds a SIGNED release APK and publishes it as a draft GitHub Release.
#
# Phone-friendly: just tap Actions → "Release" → "Run workflow" (on main). It reads
# the app's versionName, builds the signed APK, and creates a *draft* Release with
# the APK attached — review it, then tap Publish. No tags or terminal needed.
# (Pushing a v* tag does the same thing.)
on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    name: Signed release build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the draft GitHub Release (and tag, on publish)
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" \
                     "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ORACLE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ORACLE_KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Write google-services.json (optional)
        env:
          GS_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GS_JSON_BASE64" ]; then
            echo "$GS_JSON_BASE64" | base64 -d > app/google-services.json
            echo "Firebase config written; Crashlytics enabled for this build."
          else
            echo "No Firebase config provided; building without Crashlytics."
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up GPU build dependencies (Vulkan + OpenCL)
        uses: ./.github/actions/gpu-deps

      - name: Assemble signed release
        env:
          ORACLE_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ORACLE_KEYSTORE_PASSWORD: ${{ secrets.ORACLE_KEYSTORE_PASSWORD }}
          ORACLE_KEY_ALIAS: ${{ secrets.ORACLE_KEY_ALIAS }}
          ORACLE_KEY_PASSWORD: ${{ secrets.ORACLE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Print signing SHA fingerprints
        env:
          ORACLE_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ORACLE_KEYSTORE_PASSWORD: ${{ secrets.ORACLE_KEYSTORE_PASSWORD }}
          ORACLE_KEY_ALIAS: ${{ secrets.ORACLE_KEY_ALIAS }}
          ORACLE_KEY_PASSWORD: ${{ secrets.ORACLE_KEY_PASSWORD }}
        run: ./gradlew :app:printSigningSha -q

      - name: Upload native crash symbols
        env:
          GS_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          ORACLE_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ORACLE_KEYSTORE_PASSWORD: ${{ secrets.ORACLE_KEYSTORE_PASSWORD }}
          ORACLE_KEY_ALIAS: ${{ secrets.ORACLE_KEY_ALIAS }}
          ORACLE_KEY_PASSWORD: ${{ secrets.ORACLE_KEY_PASSWORD }}
        run: |
          # The upload task only exists when Firebase is configured (google-services.json
          # present), so skip it otherwise rather than failing on a missing task.
          if [ -n "$GS_JSON_BASE64" ]; then
            ./gradlew :app:uploadCrashlyticsSymbolFileRelease --stacktrace
          else
            echo "No Firebase config; skipping native symbol upload."
          fi

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Resolve release tag and notes
        id: rel
        run: |
          # On a tag push, use the tag. On a manual run, derive v<versionName> from
          # the app so no tag needs to be created by hand.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            VN=$(grep -E 'versionName[[:space:]]*=' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
            TAG="v${VN}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Use a matching hand-written notes file if present; else auto-generate.
          NOTES="docs/release-notes/${TAG}.md"
          if [ -f "$NOTES" ]; then
            echo "notes=$NOTES" >> "$GITHUB_OUTPUT"
            echo "gen=false" >> "$GITHUB_OUTPUT"
          else
            echo "notes=" >> "$GITHUB_OUTPUT"
            echo "gen=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Release tag: $TAG"

      - name: Publish GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          # Draft, so a draft release with the APK is created for you to review —
          # the git tag is only created when you click Publish. Nothing ships
          # automatically.
          draft: true
          tag_name: ${{ steps.rel.outputs.tag }}
          name: Domain AI ${{ steps.rel.outputs.tag }}
          body_path: ${{ steps.rel.outputs.notes }}
          generate_release_notes: ${{ steps.rel.outputs.gen }}
          files: app/build/outputs/apk/release/*.apk
