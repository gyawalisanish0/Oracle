name: CI

on:
  push:
    branches: [ main, claude/build-standout-feature-7doi8p ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" \
                     "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Write google-services.json (optional)
        env:
          GS_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GS_JSON_BASE64" ]; then
            echo "$GS_JSON_BASE64" | base64 -d > app/google-services.json
            echo "Firebase config written; Crashlytics enabled for the debug build."
            echo "(build.gradle.kts auto-mirrors it to src/debug with the .debug package_name.)"
          else
            echo "No Firebase config provided; building debug without Crashlytics."
          fi

      - name: Decode signing keystore (optional)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ORACLE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "Keystore decoded; debug APK will be signed with your release key."
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "No keystore secret; debug APK will use the default debug key."
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Set up GPU build dependencies (Vulkan + OpenCL)
        uses: ./.github/actions/gpu-deps

      - name: Assemble debug (compiles llama.cpp for arm64)
        env:
          ORACLE_KEYSTORE_FILE: ${{ steps.keystore.outputs.signed == 'true' && format('{0}/release.keystore', runner.temp) || '' }}
          ORACLE_KEYSTORE_PASSWORD: ${{ secrets.ORACLE_KEYSTORE_PASSWORD }}
          ORACLE_KEY_ALIAS: ${{ secrets.ORACLE_KEY_ALIAS }}
          ORACLE_KEY_PASSWORD: ${{ secrets.ORACLE_KEY_PASSWORD }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Print signing SHA fingerprints
        env:
          ORACLE_KEYSTORE_FILE: ${{ steps.keystore.outputs.signed == 'true' && format('{0}/release.keystore', runner.temp) || '' }}
          ORACLE_KEYSTORE_PASSWORD: ${{ secrets.ORACLE_KEYSTORE_PASSWORD }}
          ORACLE_KEY_ALIAS: ${{ secrets.ORACLE_KEY_ALIAS }}
          ORACLE_KEY_PASSWORD: ${{ secrets.ORACLE_KEY_PASSWORD }}
        run: ./gradlew :app:printSigningSha -q

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
